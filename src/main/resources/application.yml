server:
  port: 8080

spring:
  application:
    name: agent-backend
  profiles:
    active: dev

# DeepSeek LLM 配置 (兼容 OpenAI 协议)
llm:
  deepseek:
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY:sk-default-key}
    model-name: deepseek-chat
    temperature: 0.7
    max-tokens: 4096
    timeout: 60

  embedding:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:sk-default-key}
    model-name: text-embedding-v4

# RAG 配置
rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k: 4
  vector-store: memory
  knowledge-dir: classpath:knowledge/

# 日志配置
logging:
  level:
    com.yuke.agent: DEBUG
    dev.langchain4j: DEBUG